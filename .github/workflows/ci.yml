name: CI

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - develop
      - main
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"

jobs:
  lint-and-build:
    name: Lint and Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint || echo "No lint script configured"

      - name: Run build
        run: npm run build || echo "No build script configured"

  docker-build-check:
    name: Docker Build Verification
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Discord Bot image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    if: always()
    needs:
      - lint-and-build
      - docker-build-check

    steps:
      - name: Write summary
        run: |
          {
            echo "## Discord Bot CI Summary"
            echo ""
            echo "| Job | Result |"
            echo "| --- | --- |"
            echo "| Lint and Build | ${{ needs.lint-and-build.result }} |"
            echo "| Docker Build Check | ${{ needs.docker-build-check.result }} |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail on critical job failure
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: exit 1
